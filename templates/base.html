<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tutoring with Sehaj{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <div class="inner">
            <a href="{{ url_for('home') }}" class="brand">
                <span class="logo-mark">S</span>
                Tutoring with <span class="accent">Sehaj</span>
            </a>
            <a href="{{ url_for('progress') }}" id="user-badge" class="user-badge" style="text-decoration:none;"></a>
            <nav>
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('codelab') }}">Code Lab</a>
                <a href="{{ url_for('progress') }}">My Progress</a>
            </nav>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        © Tutoring with Sehaj — Helping students master math, Grades 1–9
    </footer>
    <script src="{{ url_for('static', filename='engagement.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
