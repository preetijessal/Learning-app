{% extends "base.html" %}
{% block title %}Practice Quiz — Tutoring with Sehaj{% endblock %}
{% block content %}
<h1>Practice Quiz</h1>
<p class="lead">Pick your grade and topic. You'll get {{ 5 }} questions to practice.</p>
<div class="card">
    <form method="POST">
        <label for="grade">Grade</label>
        <select id="grade" name="grade" required>
            {% for g in range(1, 10) %}
            <option value="{{ g }}">Grade {{ g }}</option>
            {% endfor %}
        </select>
        <label for="topic">Topic</label>
        <select id="topic" name="topic" required>
            {% for slug, name in topics.items() %}
            <option value="{{ slug }}">{{ name }}</option>
            {% endfor %}
        </select>
        <div class="btn-row">
            <button type="submit" class="btn btn-primary">Start Quiz</button>
            <a href="{{ url_for('home') }}" class="btn btn-secondary">Back</a>
        </div>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
    </form>
</div>
{% endblock %}
